name: nexus_finance
description: "Nexus Finance – A type-safe, modular personal finance tracker."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ── Database ──────────────────────────────────────────────────────────────
  isar: ^3.1.0+1
  isar_flutter_libs: any   # native AOT libs for Android / iOS

  # ── Charts ────────────────────────────────────────────────────────────────
  fl_chart: ^0.69.0

  # ── Storage & Platform ────────────────────────────────────────────────────
  path_provider: ^2.1.3
  image_picker: ^1.1.2

  # ── Typography ────────────────────────────────────────────────────────────
  google_fonts: ^6.2.1

  # ── Utilities ─────────────────────────────────────────────────────────────
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # ── Code Generation ───────────────────────────────────────────────────────
  build_runner: ^2.4.9
  isar_generator: ^3.1.0+1

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

